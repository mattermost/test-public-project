name: "Test System IO orchestration: begin run"
description: >
  Discover Playwright spec files under <mattermost-dir>/e2e-tests/playwright/specs/
  and POST /api/v1/orchestration/begin and /api/v1/reports/begin so workers can
  drain the queue and shard uploads land under a known report group.

inputs:
  test-system-io-url:
    description: "Test System IO base URL (e.g. https://staging-test-io.test.mattermost.com)"
    required: true
  oidc-audience:
    description: "OIDC audience claim the orchestrator expects (matches TSIO_GITHUB_ACTIONS_OIDC_AUDIENCE)"
    required: false
    default: "mattermost-test-system-io"
  mattermost-dir:
    description: "Path to a checked-out mattermost/mattermost"
    required: true
  identity:
    description: "Composite identity JSON {repository, commit_sha, gh_run_id, name, gh_run_attempt, branch}"
    required: true
  retest-on-fail:
    description: "When true, the orchestrator re-leases failing units (up to retest-budget per spec)"
    required: false
    default: "false"
  retest-budget:
    description: "Per-spec retest allowance"
    required: false
    default: "1"
  lease-timeout-ms:
    description: "Per-lease deadline; orchestrator returns the unit to the queue if not completed in time"
    required: false
    default: "600000"
  run-timeout-ms:
    description: "Run-level deadline"
    required: false
    default: "7200000"
  playwright-project:
    description: "Recorded on the run for UI display only"
    required: false
    default: "chrome"
  node-version:
    description: "Node version for the begin script"
    required: false
    default: "24"

runs:
  using: composite
  steps:
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: ${{ inputs.node-version }}
    - id: oidc
      shell: bash
      env:
        AUD: ${{ inputs.oidc-audience }}
      run: |
        if [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
          echo "ERROR: GitHub Actions OIDC env vars missing — caller must grant 'permissions: id-token: write'." >&2
          exit 1
        fi
        TOKEN=$(curl -fsSL \
          -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${AUD}" | jq -r '.value')
        echo "::add-mask::${TOKEN}"
        echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"
    - shell: bash
      env:
        TEST_SYSTEM_IO_URL: ${{ inputs.test-system-io-url }}
        TEST_SYSTEM_IO_BEARER: ${{ steps.oidc.outputs.token }}
        MATTERMOST_DIR: ${{ inputs.mattermost-dir }}
        IDENTITY: ${{ inputs.identity }}
        RETEST_ON_FAIL: ${{ inputs.retest-on-fail }}
        RETEST_BUDGET: ${{ inputs.retest-budget }}
        LEASE_TIMEOUT_MS: ${{ inputs.lease-timeout-ms }}
        RUN_TIMEOUT_MS: ${{ inputs.run-timeout-ms }}
        PLAYWRIGHT_PROJECT: ${{ inputs.playwright-project }}
      run: node "${GITHUB_ACTION_PATH}/orch-begin.mjs"
