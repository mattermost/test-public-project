name: "Test System IO orchestration: drain queue + upload shard"
description: >
  Resolve this matrix entry's gh_job_id, drain the orchestration queue
  (checkout → playwright → complete), archive per-iteration Playwright JSON +
  screenshots, and at queue-empty upload this worker's accumulated artifacts
  as one shard report via /api/v1/reports/*. Caller is responsible for having
  the mattermost stack up (make cloud-init + make start-server) before calling.

inputs:
  test-system-io-url:
    description: "Test System IO base URL"
    required: true
  oidc-audience:
    description: "OIDC audience claim the orchestrator expects"
    required: false
    default: "mattermost-test-system-io"
  composite-identity:
    description: "Composite identity JSON (same payload the begin action received)"
    required: true
  mattermost-dir:
    description: "Path to a checked-out mattermost/mattermost (e2e-tests stack already up)"
    required: true
  artifacts-root:
    description: "Writable directory for per-iteration archived results"
    required: true
  github-token:
    description: "Token with actions:read; used to look up gh_job_id"
    required: true
  gh-job-name:
    description: >
      Rendered job name of the calling matrix entry (e.g. orch-worker-3).
      The action looks this up in the run's jobs list to resolve
      gh_job_id, and sends the same value to the orchestrator and
      uploader as gh_job_name so every worker in the matrix has a
      unique, human-readable identity. The caller MUST keep this in sync
      with the workers job's name field — the matrix-suffix template
      passed here must match the matrix-suffix template on `name:`.
    required: true
  playwright-retries:
    description: >
      Value passed to `npx playwright test --retries=N` so Playwright
      handles flaky-test retries within a single process invocation.
      Each spec is dispatched to the orchestration queue once; the
      orchestration retest queue is reserved for whole-spec catastrophic
      failures and is opt-in via the workflow's retest_on_fail input.
      Set to 0 to disable Playwright-internal retries entirely.
    required: false
    default: "2"
  node-version:
    description: "Node version for the worker script"
    required: false
    default: "24"

runs:
  using: composite
  steps:
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: ${{ inputs.node-version }}
    - id: resolve-job-id
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        EXPECTED_NAME: "${{ inputs.gh-job-name }}"
      run: |
        PAGE=1
        JOB_ID=""
        while [ -z "$JOB_ID" ]; do
          RESPONSE=$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/attempts/${GITHUB_RUN_ATTEMPT}/jobs?per_page=100&page=${PAGE}")
          JOB_ID=$(echo "$RESPONSE" | jq -r --arg n "$EXPECTED_NAME" '.jobs[] | select(.name == $n) | .id' | head -n1)
          COUNT=$(echo "$RESPONSE" | jq -r '.jobs | length')
          if [ "$COUNT" -eq 0 ] || [ -n "$JOB_ID" ]; then break; fi
          PAGE=$((PAGE + 1))
        done
        if [ -z "$JOB_ID" ]; then
          echo "could not resolve gh_job_id for '${EXPECTED_NAME}'" >&2
          exit 1
        fi
        echo "id=${JOB_ID}" >> "$GITHUB_OUTPUT"
        echo "Resolved gh_job_id=${JOB_ID}"
    - shell: bash
      env:
        TEST_SYSTEM_IO_URL: ${{ inputs.test-system-io-url }}
        OIDC_AUDIENCE: ${{ inputs.oidc-audience }}
        COMPOSITE_IDENTITY: ${{ inputs.composite-identity }}
        MATTERMOST_DIR: ${{ inputs.mattermost-dir }}
        ARTIFACTS_ROOT: ${{ inputs.artifacts-root }}
        GH_JOB_ID: ${{ steps.resolve-job-id.outputs.id }}
        GH_JOB_NAME: ${{ inputs.gh-job-name }}
        PLAYWRIGHT_RETRIES: ${{ inputs.playwright-retries }}
      run: node "${GITHUB_ACTION_PATH}/orch-worker.mjs"
