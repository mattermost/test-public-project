---
name: PR Test Analysis Override (Hub)

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Target repo under mattermost org"
        required: true
        type: choice
        options:
          - mattermost
          - enterprise
          - mattermost-mobile
          - desktop
          - mattermost-plugin-calls
          - mattermost-plugin-agents
          - mattermost-plugin-boards
      pr_number:
        description: "PR number from the target repo"
        required: true
        type: number
      reason:
        description: "Override reason"
        required: true
        type: string

concurrency:
  group: test-analyzer-override-${{ inputs.repo }}-${{ inputs.pr_number }}
  cancel-in-progress: false

jobs:
  override:
    permissions:
      statuses: write
      pull-requests: read
      contents: read
      issues: write
    # Ideally pin to a full commit SHA for stability; using @main for fast iteration during development.
    uses: mattermost/mattermost-test-automation-toolkit/.github/workflows/pr-test-analysis-override.yml@main
    with:
      pr_number: ${{ fromJSON(inputs.pr_number) }}
      target_repo: ${{ format('mattermost/{0}', inputs.repo) }}
      reason: ${{ inputs.reason }}
      comment_id: 0 # No comment to react to in dispatch mode; reaction step fails silently
      sender: ${{ github.actor }}
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      WEBHOOK_URL: ${{ secrets.WEBHOOK_URL_TEST_PR_ANALYSIS_HUB }}
