---
name: PR Test Analysis (Hub)

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Target repo under mattermost org"
        required: true
        type: choice
        options:
          - mattermost
          - mattermost-mobile
      pr_number:
        description: "PR number from the target repo"
        required: true
        type: number

concurrency:
  group: test-analyzer-hub-${{ inputs.repo }}-${{ inputs.pr_number }}
  cancel-in-progress: true

jobs:
  analyze:
    permissions:
      contents: read
      pull-requests: write
      statuses: write
      id-token: write
    uses: mattermost/mattermost-test-automation-toolkit/.github/workflows/pr-test-analysis.yml@SEC-9968_reusable-pr-test-analysis
    with:
      pr_number: ${{ inputs.pr_number }}
      target_repo: ${{ format('mattermost/{0}', inputs.repo) }}
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
