---
# Dispatch variant of mattermost/mattermost's
# .github/workflows/e2e-tests-playwright-template-v2.yml.
#
# Replaces:
#   - Playwright `--shard=N/M` matrix → Test System IO dispatch (begin/checkout/complete)
#   - Failed-spec retest job          → Playwright --retries=N (per-spec, in-process). Optionally
#                                       layered with retest_on_fail (dispatch-level re-lease)
#                                       for whole-spec catastrophic failures; off by default.
#   - S3 report sync                  → Test System IO /api/v1/reports/* upload chain
#
# Authenticates to Test System IO via GitHub Actions OIDC (no api_key secret required).
# The staging server auto-seeds a `mattermost/* → uploader` policy on every
# deploy via TSIO_BOOTSTRAP_OIDC_POLICIES, so any repo under the mattermost/
# org is authorized out of the box. Production seeds policies manually via
# POST /api/v1/auth/oidc-policies (admin-key gated).
#
# Server license is sourced from the org-level secret
# `MM_E2E_TEST_LICENSE_ONPREM_ENT` (matches the convention used by the upstream
# mattermost/mattermost workflows). Only required for enterprise tests.

name: E2E - Playwright (Test System IO dispatch)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "mattermost/mattermost PR number to test (overrides mattermost_ref when set)"
        type: string
        default: ""
      mattermost_ref:
        description: "mattermost/mattermost ref to test (branch/tag/sha). Ignored if pr_number is set."
        type: string
        default: master
      server_image_tag:
        description: "Server image tag (e.g. master or short SHA)"
        type: string
        default: master
      server_edition:
        description: "Server edition"
        type: choice
        options: [enterprise, fips, team]
        default: enterprise
      server_image_repo:
        description: "Docker registry"
        type: choice
        options: [mattermostdevelopment, mattermost]
        default: mattermostdevelopment
      enabled_docker_services:
        description: "Space-separated docker services for cloud-init"
        type: string
        default: "postgres inbucket"
      workers:
        description: "Number of parallel Test System IO dispatch jobs"
        type: number
        default: 8
      playwright_project:
        description: "Playwright project name (passed to both dispatch-begin metadata and dispatch-run --project=)."
        type: string
        default: chrome
      playwright_retries:
        description: "Playwright --retries=N value (per-spec, in-process retry of flaky tests)"
        type: number
        default: 1
      retest_on_fail:
        description: "Re-dispatch failed dispatch units once (dispatch-level whole-spec retry, on top of Playwright --retries)"
        type: boolean
        default: true
      test_system_io_use_staging:
        description: "Target the staging deployment instead of production"
        type: boolean
        default: true
      test_system_io_run_name:
        description: "Test System IO run name (stable across re-runs of the same workflow)"
        type: string
        default: "playwright-dispatch-test"

permissions:
  contents: read
  id-token: write   # needed to mint GitHub Actions OIDC tokens for Test System IO auth

env:
  TEST_SYSTEM_IO_USE_STAGING: ${{ inputs.test_system_io_use_staging }}
  TEST_SYSTEM_IO_RUN_NAME: ${{ inputs.test_system_io_run_name }}
  MATTERMOST_REPO: mattermost/mattermost
  SERVER_IMAGE: "${{ inputs.server_image_repo }}/${{ inputs.server_edition == 'fips' && 'mattermost-enterprise-fips-edition' || inputs.server_edition == 'team' && 'mattermost-team-edition' || 'mattermost-enterprise-edition' }}:${{ inputs.server_image_tag }}"

jobs:
  controller:
    name: dispatch-controller
    runs-on: ubuntu-24.04
    outputs:
      composite-identity-json: ${{ steps.composite-identity.outputs.composite-identity-json }}
      workers-matrix: ${{ steps.matrix.outputs.workers }}
      mattermost_ref: ${{ steps.resolve-ref.outputs.ref }}
      mattermost_branch: ${{ steps.resolve-ref.outputs.branch }}
      mattermost_sha: ${{ steps.resolve-sha.outputs.sha }}
    steps:
      - name: ci/checkout-tsio-pipeline
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: ci/resolve-mattermost-ref
        # pr_number takes precedence over mattermost_ref when set. PRs are
        # fetched via refs/pull/<n>/head; branch attribution becomes "pr-<n>"
        # so the dashboard groups runs by PR rather than by source branch.
        id: resolve-ref
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          MATTERMOST_REF: ${{ inputs.mattermost_ref }}
        run: |
          if [ -n "$PR_NUMBER" ]; then
            echo "ref=refs/pull/${PR_NUMBER}/head" >> "$GITHUB_OUTPUT"
            echo "branch=pr-${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${MATTERMOST_REF}" >> "$GITHUB_OUTPUT"
            echo "branch=${MATTERMOST_REF}" >> "$GITHUB_OUTPUT"
          fi
      - name: ci/checkout-mattermost
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.MATTERMOST_REPO }}
          ref: ${{ steps.resolve-ref.outputs.ref }}
          path: mm
          fetch-depth: 1
      - name: ci/resolve-sha
        id: resolve-sha
        working-directory: mm
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: ci/composite-identity
        id: composite-identity
        env:
          MM_SHA: ${{ steps.resolve-sha.outputs.sha }}
          MM_BRANCH: ${{ steps.resolve-ref.outputs.branch }}
        run: |
          COMPOSITE_IDENTITY=$(jq -nc \
            --arg repo "${{ env.MATTERMOST_REPO }}" \
            --arg sha "${MM_SHA}" \
            --arg run_id "${GITHUB_RUN_ID}" \
            --arg name "${TEST_SYSTEM_IO_RUN_NAME}" \
            --arg attempt "${GITHUB_RUN_ATTEMPT}" \
            --arg branch "${MM_BRANCH}" \
            '{repository:$repo, commit_sha:$sha, gh_run_id:$run_id, name:$name, gh_run_attempt:$attempt, branch:$branch}')
          echo "composite-identity-json=${COMPOSITE_IDENTITY}" >> "$GITHUB_OUTPUT"
          echo "Composite identity: ${COMPOSITE_IDENTITY}"
      - name: ci/matrix
        id: matrix
        run: |
          echo "workers=$(jq -nc --argjson n ${{ inputs.workers }} '[range(1; $n+1)]')" >> "$GITHUB_OUTPUT"

  # Build @mattermost/client + @mattermost/types and install playwright deps once,
  # then workers restore from cache. Playwright only consumes those two packages
  # from webapp, so cache just their built lib/ instead of all of webapp/node_modules.
  prep-deps:
    name: prep-deps
    runs-on: ubuntu-24.04
    needs: controller
    timeout-minutes: 10
    steps:
      - name: ci/checkout-mattermost
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.MATTERMOST_REPO }}
          ref: ${{ needs.controller.outputs.mattermost_sha }}
          path: mm
          fetch-depth: 1
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: mm/.nvmrc
      - name: ci/cache-platform-pkgs
        # `webapp/node_modules/@mattermost/{client,types}` are the workspace
        # symlinks Node walks up to find when platform/client requires
        # @mattermost/types. Without them, module resolution fails inside
        # the slim slice.
        id: cache-platform-pkgs
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            mm/webapp/node_modules/@mattermost/client
            mm/webapp/node_modules/@mattermost/types
            mm/webapp/platform/client/lib
            mm/webapp/platform/client/node_modules
            mm/webapp/platform/types/lib
            mm/webapp/platform/types/node_modules
          key: e2e-platform-pkgs-${{ runner.os }}-${{ hashFiles('mm/webapp/package-lock.json', 'mm/webapp/platform/client/src/**', 'mm/webapp/platform/client/tsconfig*.json', 'mm/webapp/platform/types/src/**', 'mm/webapp/platform/types/tsconfig*.json') }}
      - name: ci/build-platform-pkgs
        # Full webapp install is needed for tsc + workspace linking; the
        # postinstall builds platform/{client,types}/lib. We only cache those.
        if: steps.cache-platform-pkgs.outputs.cache-hit != 'true'
        working-directory: mm/webapp
        run: make node_modules
      - name: ci/cache-playwright-deps
        # Caches node_modules + the rolled-up @mattermost/playwright-lib dist
        # so workers don't re-run rollup on every job.
        id: cache-playwright
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            mm/e2e-tests/playwright/node_modules
            mm/e2e-tests/playwright/lib/dist
            mm/e2e-tests/playwright/lib/node_modules
          key: e2e-playwright-deps-${{ runner.os }}-${{ hashFiles('mm/e2e-tests/playwright/package-lock.json', 'mm/e2e-tests/playwright/lib/src/**', 'mm/e2e-tests/playwright/lib/package.json', 'mm/e2e-tests/playwright/lib/rollup.config.js', 'mm/e2e-tests/playwright/lib/tsconfig.json') }}
      - name: ci/install-playwright-deps
        # `npm ci` creates symlinks at node_modules/@mattermost/{client,types}
        # → webapp/platform/{client,types}; targets must already be built.
        # The postinstall then builds lib/dist via rollup. Skip browser
        # download here — chromium is cached separately below.
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        working-directory: mm/e2e-tests/playwright
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: npm ci
      - name: ci/cache-playwright-browsers
        # Cache chromium binary (~150MB) keyed on the playwright lockfile so a
        # version bump invalidates. Restored by workers; no docker image needed.
        id: cache-pw-browsers
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('mm/e2e-tests/playwright/package-lock.json') }}
      - name: ci/install-playwright-chromium
        if: steps.cache-pw-browsers.outputs.cache-hit != 'true'
        working-directory: mm/e2e-tests/playwright
        run: npx playwright install chromium

  # Register the TSIO run AFTER prep-deps so workers reach dispatch-run
  # within TSIO's inactivity window.
  dispatch-begin:
    name: dispatch-begin
    runs-on: ubuntu-24.04
    needs: [controller, prep-deps]
    steps:
      - name: ci/checkout-mattermost
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.MATTERMOST_REPO }}
          ref: ${{ needs.controller.outputs.mattermost_sha }}
          path: mm
          fetch-depth: 1
      - name: ci/dispatch-begin
        uses: mattermost/mattermost-test-system-io/.github/actions/test-system-io-dispatch-begin@main
        with:
          use-staging: ${{ env.TEST_SYSTEM_IO_USE_STAGING }}
          framework: playwright
          repo-dir: ${{ github.workspace }}/mm
          composite-identity: ${{ needs.controller.outputs.composite-identity-json }}
          total-reports-expected: ${{ inputs.workers }}
          retest-on-fail: ${{ inputs.retest_on_fail }}
          playwright-project: ${{ inputs.playwright_project }}

  workers:
    name: dispatch-run-${{ matrix.worker_index }}
    runs-on: ubuntu-24.04
    needs: [controller, dispatch-begin]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        worker_index: ${{ fromJSON(needs.controller.outputs.workers-matrix) }}
    env:
      COMPOSITE_IDENTITY: ${{ needs.controller.outputs.composite-identity-json }}
      SERVER: onprem
      MM_LICENSE: ${{ secrets.MM_E2E_TEST_LICENSE_ONPREM_ENT }}
      ENABLED_DOCKER_SERVICES: ${{ inputs.enabled_docker_services }}
      TEST: playwright
      BRANCH: ${{ needs.controller.outputs.mattermost_branch }}
      BUILD_ID: ${{ github.run_id }}
      CI_BASE_URL: dispatch-${{ matrix.worker_index }}
    steps:
      - name: ci/checkout-tsio-pipeline
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: ci/checkout-mattermost
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.MATTERMOST_REPO }}
          ref: ${{ needs.controller.outputs.mattermost_sha }}
          path: mm
          fetch-depth: 1
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: mm/.nvmrc
      - name: ci/restore-platform-pkgs
        # Built lib/ for @mattermost/client and @mattermost/types, plus the
        # webapp workspace symlinks under webapp/node_modules/@mattermost/.
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            mm/webapp/node_modules/@mattermost/client
            mm/webapp/node_modules/@mattermost/types
            mm/webapp/platform/client/lib
            mm/webapp/platform/client/node_modules
            mm/webapp/platform/types/lib
            mm/webapp/platform/types/node_modules
          key: e2e-platform-pkgs-${{ runner.os }}-${{ hashFiles('mm/webapp/package-lock.json', 'mm/webapp/platform/client/src/**', 'mm/webapp/platform/client/tsconfig*.json', 'mm/webapp/platform/types/src/**', 'mm/webapp/platform/types/tsconfig*.json') }}
          fail-on-cache-miss: true
      - name: ci/restore-playwright-deps
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            mm/e2e-tests/playwright/node_modules
            mm/e2e-tests/playwright/lib/dist
            mm/e2e-tests/playwright/lib/node_modules
          key: e2e-playwright-deps-${{ runner.os }}-${{ hashFiles('mm/e2e-tests/playwright/package-lock.json', 'mm/e2e-tests/playwright/lib/src/**', 'mm/e2e-tests/playwright/lib/package.json', 'mm/e2e-tests/playwright/lib/rollup.config.js', 'mm/e2e-tests/playwright/lib/tsconfig.json') }}
          fail-on-cache-miss: true
      - name: ci/restore-playwright-browsers
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('mm/e2e-tests/playwright/package-lock.json') }}
          fail-on-cache-miss: true
      - name: ci/cloud-init
        working-directory: mm/e2e-tests
        run: make cloud-init
      - name: ci/start-server
        working-directory: mm/e2e-tests
        run: make start-server
      # Run the `setup` project so per-spec dispatches can pass --no-deps
      # and skip plugin-load + server-deployment checks. node_modules,
      # lib/dist, and chromium are all restored from cache.
      - name: ci/prepare-playwright
        working-directory: mm/e2e-tests/playwright
        run: npx playwright test --project=setup
      - name: ci/dispatch-run
        uses: mattermost/mattermost-test-system-io/.github/actions/test-system-io-dispatch-run@main
        with:
          use-staging: ${{ env.TEST_SYSTEM_IO_USE_STAGING }}
          framework: playwright
          composite-identity: ${{ needs.controller.outputs.composite-identity-json }}
          repo-dir: ${{ github.workspace }}/mm
          artifacts-root: ${{ github.workspace }}/worker-artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-job-name: dispatch-run-${{ matrix.worker_index }}
          playwright-retries: ${{ inputs.playwright_retries }}
          playwright-project: ${{ inputs.playwright_project }}
      - name: ci/cloud-teardown
        if: always()
        working-directory: mm/e2e-tests
        run: make cloud-teardown
      # Always uploaded, even when the worker exits non-zero, so a 401 on
      # /complete or /reports/* doesn't lose the per-iteration Playwright
      # JSON + screenshots. `worker-artifacts/<gh_job_id>/iter-N/` holds
      # archived copies the worker made after each spec; the live
      # `playwright/results/` catches the in-flight iteration that may not
      # have been archived yet if the runner died mid-spec.
      - name: ci/upload-debug-artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dispatch-run-${{ matrix.worker_index }}-debug
          path: |
            mm/e2e-tests/playwright/logs/
            mm/e2e-tests/playwright/results/
            worker-artifacts/
          retention-days: 5
          if-no-files-found: ignore

  report:
    runs-on: ubuntu-24.04
    needs: [controller, dispatch-begin, workers]
    if: always()
    env:
      COMPOSITE_IDENTITY: ${{ needs.controller.outputs.composite-identity-json }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: ci/run-summary
        uses: mattermost/mattermost-test-system-io/.github/actions/test-system-io-summary@main
        with:
          use-staging: ${{ env.TEST_SYSTEM_IO_USE_STAGING }}
          composite-identity: ${{ needs.controller.outputs.composite-identity-json }}
          framework: playwright
